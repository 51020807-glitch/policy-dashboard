name: 政策通知自动更新

on:
  schedule:
    # 北京时间 8:00 (UTC+8) → UTC 0:00
    - cron: "0 0 * * *"
    # 北京时间 14:00 (UTC+8) → UTC 6:00  (中间检查)
    - cron: "0 6 * * *"
    # 北京时间 20:00 (UTC+8) → UTC 12:00
    - cron: "0 12 * * *"
  workflow_dispatch:
    # 允许手动触发

# 确保同一时间只有一个实例在运行
concurrency:
  group: dashboard-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行更新脚本
        env:
          TENCENT_NEWS_APIKEY: ${{ secrets.TENCENT_NEWS_APIKEY }}
        run: python auto_update.py

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard-data.json index.html
          if git diff --cached --quiet; then
            echo "没有新的更新"
          else
            git commit -m "🤖 自动更新政策通知 — $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
            git push
          fi

  deploy:
    needs: update
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Pages
        uses: actions/configure-pages@v5

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
