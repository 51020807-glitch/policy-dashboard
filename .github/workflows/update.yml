name: 政策通知自动更新

on:
  schedule:
    # 每12小时一次：北京时间 8:00 和 20:00
    - cron: "0 0,12 * * *"
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行更新脚本
        env:
          TENCENT_NEWS_APIKEY: ${{ secrets.TENCENT_NEWS_APIKEY }}
        run: python auto_update.py

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard-data.json index.html
          if git diff --cached --quiet; then
            echo "没有新的更新"
          else
            git commit -m "🤖 自动更新政策通知 — $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
            git push
            echo "✅ 看板已更新并推送"
          fi
